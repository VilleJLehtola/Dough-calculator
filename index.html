<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Everything Dough</title>

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Preconnect/DNS-prefetch: Supabase & Plausible (+ Unsplash for hero) -->
    <link
      rel="preconnect"
      href="https://btozmkrowcrjzvxxhlbn.supabase.co"
      crossorigin
    />
    <link
      rel="dns-prefetch"
      href="https://btozmkrowcrjzvxxhlbn.supabase.co"
    />
    <link rel="preconnect" href="https://plausible.io" />
    <link rel="dns-prefetch" href="https://plausible.io" />
    <link rel="preconnect" href="https://images.unsplash.com" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.breadcalculator.online/" />

    <!-- Basic SEO -->
    <meta
      name="description"
      content="Taikinalaskin leivälle ja pizzalle. Laske vesi–jauho–suola, tallenna suosikit ja selaa reseptejä."
    />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Everything Dough" />
    <meta
      property="og:title"
      content="Everything Dough – Taikinalaskin leivälle & pizzalle"
    />
    <meta
      property="og:description"
      content="Laske täydellinen taikina, luo reseptejä ja tallenna suosikit verkossa."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://www.breadcalculator.online/"
    />
    <meta
      property="og:image"
      content="https://www.breadcalculator.online/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fi_FI" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Everything Dough – Taikinalaskin leivälle & pizzalle"
    />
    <meta
      name="twitter:description"
      content="Laske täydellinen taikina, luo reseptejä ja tallenna suosikit."
    />
    <meta
      name="twitter:image"
      content="https://www.breadcalculator.online/og-image.jpg"
    />

    <!-- Plausible (enhanced features build) -->
    <script
      defer
      data-domain="breadcalculator.online"
      src="https://plausible.io/js/script.file-downloads.hash.outbound-links.pageview-props.revenue.tagged-events.js"
    ></script>
    <script>
      window.plausible =
        window.plausible ||
        function () {
          (window.plausible.q = window.plausible.q || []).push(arguments);
        };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
